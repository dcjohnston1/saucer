<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saucer</title>
  <link rel="stylesheet" href="style.css?v=7.0" />
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <div id="app">
    <header>
      <button id="hamburger-btn" class="hamburger-btn hidden" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <h1><img src="saucer_logo.png" alt="" class="header-logo" />Saucer</h1>
      <p class="tagline">Your household, in sync.</p>
    </header>

    <div id="drawer-overlay" class="hidden"></div>
    <nav id="side-drawer" class="side-drawer">
      <div class="drawer-header">Menu</div>
      <ul class="drawer-menu">
        <li class="drawer-item" id="menu-senders">Monitored Senders</li>
        <li class="drawer-item drawer-item--soon">Notifications</li>
        <li class="drawer-item drawer-item--soon">Account</li>
        <li class="drawer-item drawer-item--soon">About</li>
      </ul>
    </nav>

    <div id="senders-screen" class="screen hidden">
      <div class="screen-header">
        <button id="senders-back-btn" class="back-btn">&#8592; Back</button>
        <span class="screen-title">Monitored Senders</span>
      </div>
      <div class="screen-body">
        <div id="senders-list"></div>
        <div id="add-sender-row">
          <input id="new-sender-input" type="email" placeholder="Add email address..." />
          <button id="add-sender-btn">Add</button>
        </div>
      </div>
    </div>

    <div id="login-screen">
      <p class="login-prompt">Sign in to continue</p>
      <div id="g_id_onload"
        data-client_id="987132498395-o9ldqc2vqu1b36d7d8leh8d56f4eu83a.apps.googleusercontent.com"
        data-callback="handleGoogleSignIn"
        data-auto_select="true">
      </div>
      <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>
      <p id="login-error" class="hidden">Access denied. This app is private.</p>
    </div>

    <div id="main-app" class="hidden">
      <div id="user-bar">
        <span id="user-name"></span>
        <button id="sign-out-btn">Sign out</button>
      </div>

      <div id="emails-section">
        <h3>Recent Emails</h3>
        <div id="emails-content"><div class="loading">Loading emails...</div></div>
      </div>

      <div id="home-list-section">
        <h3>Current Shared List</h3>
        <div id="home-doc-content">Loading list...</div>
      </div>

      <div id="chat-panel">
        <div id="messages"></div>
        <div id="input-row">
          <textarea id="msg-input" placeholder="Type a message…" rows="2"></textarea>
          <button id="send-btn">Send</button>
        </div>
        <div id="model-info"></div>
      </div>
    </div>
  </div>
  <script src="app.js?v=5.0"></script>
</body>
</html>
